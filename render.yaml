services:
  api:
    type: web
    name: eurohouse-api
    env: node
    plan: free
    rootDir: .
    buildCommand: buildCommand: npx pnpm@10.13.1 install --frozen-lockfile && npx pnpm@10.13.1 --filter @eurohouse/api build
    startCommand: npx pnpm@10.13.1 --filter @eurohouse/api start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
