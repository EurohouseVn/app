services:
  api:
    type: web
    name: eurohouse-api
    env: node
    plan: free
    rootDir: .
    buildCommand: >
      npx pnpm@10.13.1 install --frozen-lockfile &&
      npx pnpm@10.13.1 --filter @eurohouse/api exec prisma generate &&
      npx pnpm@10.13.1 --filter @eurohouse/api build
    # Lưu ý: seed.ts KHÔNG chạy ở đây — seed xóa/tạo lại profile + orderItem mỗi lần chạy,
    # nếu để trong startCommand sẽ mất dữ liệu đơn hàng thật mỗi lần service restart/redeploy.
    # Chạy seed đúng 1 lần duy nhất qua Render Shell sau khi deploy lần đầu thành công.
    startCommand: >
      npx pnpm@10.13.1 --filter @eurohouse/api exec prisma migrate deploy &&
      npx pnpm@10.13.1 --filter @eurohouse/api start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DEMO_ADMIN_EMAIL
        sync: false
      - key: DEMO_ADMIN_PASSWORD
        sync: false
