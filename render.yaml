services:
  api:
    type: web
    name: eurohouse-api
    env: node
    plan: free
    rootDir: .
    # Prod dùng Postgres: cần đổi provider trong prisma/schema.prisma sang "postgresql"
    # rồi db push để đồng bộ schema và seed dữ liệu danh mục.
    buildCommand: >
      npx pnpm@10.13.1 install --frozen-lockfile &&
      npx pnpm@10.13.1 --filter @eurohouse/api exec prisma generate &&
      npx pnpm@10.13.1 --filter @eurohouse/api build
    startCommand: >
      npx pnpm@10.13.1 --filter @eurohouse/api exec prisma db push --skip-generate &&
      npx pnpm@10.13.1 --filter @eurohouse/api exec ts-node prisma/seed.ts &&
      npx pnpm@10.13.1 --filter @eurohouse/api start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DEMO_ADMIN_EMAIL
        sync: false
      - key: DEMO_ADMIN_PASSWORD
        sync: false
